<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Saphau Foods</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
  const firebaseConfig = {
    databaseURL: "https://saphau-food-default-rtdb.firebaseio.com/",
    projectId: "318798322657"
  };
  const app = firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
</script>
<style>
:root{
  --primary:#7cbf5c;--bg:#F6F6F6;--surface:#FFFFFF;--line:#E2E8D9;--muted:#6B7280;
  --accent:#7cbf5c;--accentText:#FFFFFF;--success:#18A957;--radius:16px;
  --shadow:0 1px 2px rgba(10,10,10,.06),0 8px 24px rgba(10,10,10,.05);
  --shadow-sm:0 1px 3px rgba(10,10,10,.08);
  --safe:env(safe-area-inset-bottom,0px);--container:740px;
  --accentLight:#e8f5e0;--accentDark:#5a9a3e;
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background:var(--bg);color:#111;font-family:Inter,system-ui,-apple-system,"Segoe UI",Arial,sans-serif;line-height:1.35}
img{max-width:100%;display:block}
button{font:inherit;cursor:pointer}
a{color:inherit;text-decoration:none}
#app{min-height:100dvh;display:flex;flex-direction:column}
.wrap{max-width:var(--container);margin:0 auto}
.topbar{position:sticky;top:0;z-index:20;background:#fff;backdrop-filter:saturate(120%) blur(6px);border-bottom:1px solid var(--line)}
.topbar-inner{height:56px;display:flex;align-items:center;gap:10px;padding:0 16px}
.topbar-logo{height:36px;width:auto;border-radius:8px;flex-shrink:0}
.title{font-family:Poppins,sans-serif;font-size:20px;font-weight:700;margin:0;color:var(--accentDark)}
.icon-round{width:36px;height:36px;border-radius:999px;border:1px solid var(--line);background:#fff;display:inline-grid;place-items:center;color:#111;box-shadow:var(--shadow-sm)}
.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:30;background:rgba(255,255,255,.95);border-top:1px solid var(--line);backdrop-filter:saturate(120%) blur(6px);padding-bottom:var(--safe)}
.tabbar-inner{max-width:var(--container);margin:0 auto;display:grid;grid-template-columns:repeat(5,1fr);gap:2px;padding:8px 8px calc(10px + var(--safe))}
.tabbar-inner.four-tabs{grid-template-columns:repeat(4,1fr)}
.tab{display:flex;flex-direction:column;align-items:center;gap:4px;color:#9CA3AF;padding:6px 4px;border-radius:10px;font-size:11px;transition:color .2s}
.tab.active{color:var(--accent);background:var(--accentLight)}
.tab span{font-size:11px}
.tab i{font-size:18px}
.loader{text-align:center;padding:30px;color:var(--muted)}
.loader .dot{display:inline-block;width:8px;height:8px;background:var(--accent);border-radius:999px;margin:0 2px;animation:bounce 1.4s infinite ease-in-out both}
.loader .dot:nth-child(1){animation-delay:-.32s}
.loader .dot:nth-child(2){animation-delay:-.16s}
@keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card.pad{padding:16px}
.muted{color:var(--muted)}
.chip{display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:999px;border:1px solid var(--line);background:#fff;font-size:14px}
input,textarea,select{width:100%;padding:14px;border:1px solid var(--line);border-radius:14px;background:#fff;font:inherit}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,191,92,.15)}
textarea{min-height:92px;resize:vertical}
label{font-size:13px;color:#111;margin:10px 0 6px;display:block}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;font-weight:700;border:none;border-radius:14px;padding:14px 16px;background:var(--accent);color:var(--accentText);transition:background .2s}
.btn:hover{background:var(--accentDark)}
.btn:active{transform:translateY(1px)}
.btn-outline{background:#fff;color:#111;border:1px solid var(--line)}
.btn-outline:hover{background:var(--accentLight);border-color:var(--accent)}
.btn-block{width:100%}
.btn-sm{padding:8px 12px;font-size:13px;border-radius:10px}
.btn-success{background:var(--success);color:#fff;border:none}
.btn-danger{background:#E11D48;color:#fff;border:none}
.star-rating{color:#FFD700;font-size:18px;margin-left:auto}
.rate-stars .fa-star{cursor:pointer;transition:color .2s}
.rate-stars .active{color:#FFD700}
.size-btn{display:inline-flex;align-items:center;justify-content:center;height:56px;min-width:56px;padding:0 12px;border-radius:12px;border:1px solid var(--line);background:var(--surface);font-weight:600;box-shadow:var(--shadow-sm);transition:all .2s}
.size-btn.active,.size-btn:active{transform:translateY(1px);box-shadow:0 1px 2px rgba(10,10,10,.06);background:var(--accentLight);border:2px solid var(--accent);color:var(--accentDark)}
.price-line{display:flex;align-items:center;gap:8px}
.strike{color:#9CA3AF;text-decoration:line-through}
.badge-off{background:var(--accent);color:var(--accentText);border-radius:999px;font-size:12px;padding:4px 8px}
.filters{display:flex;gap:10px;overflow:auto;padding:8px 0}
.filters .chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.grid{display:grid;gap:14px;grid-template-columns:1fr 1fr}
@media(min-width:680px){.grid{grid-template-columns:repeat(3,1fr)}}
.p-card{overflow:hidden;position:relative;transition:transform .2s}
.p-card:hover{transform:translateY(-2px)}
.p-img{border-bottom:1px solid var(--line);position:relative;width:100%;aspect-ratio:1/1}
.p-img img{width:100%;height:100%;object-fit:cover}
.p-meta{padding:12px}
.p-title{font-weight:600}
.discount-badge{position:absolute;top:10px;right:10px;background:var(--accent);color:var(--accentText);border-radius:999px;font-size:12px;padding:6px 10px}
.hero-img{margin:12px;border-radius:18px;overflow:hidden;max-height:450px;display:flex}
.hero-img img{width:100%;aspect-ratio:1/1.6;object-fit:cover;object-position:center top}
.cart-list{display:flex;flex-direction:column;gap:12px}
.cart-item{display:grid;grid-template-columns:76px 1fr auto;gap:12px;align-items:center;padding:10px;border-radius:14px;border:1px solid var(--line);background:#fff}
.cart-item img{width:76px;height:76px;object-fit:cover;border-radius:12px;border:1px solid var(--line)}
.qty{display:flex;align-items:center;gap:10px;margin-top:8px}
.circle-btn{width:36px;height:36px;border-radius:999px;border:1px solid var(--line);display:grid;place-items:center;background:#F3F4F6;color:#111}
.circle-btn.primary{background:var(--accent);color:var(--accentText);border-color:var(--accent)}
.sticky-sheet{position:sticky;bottom:0;background:rgba(255,255,255,.94);backdrop-filter:saturate(120%) blur(6px);border-top:1px solid var(--line);padding:12px;border-bottom-left-radius:12px;border-bottom-right-radius:12px}
.row{display:flex;align-items:center;justify-content:space-between}
.sep{height:1px;background:var(--line);margin:10px 0}
.success-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 14px}
.check-anim{width:92px;height:92px;border-radius:999px;background:#E9FAF1;border:2px solid #CFF7DF;display:grid;place-items:center;color:#18A957;animation:pop .35s ease-out forwards,glow 1.2s ease-in-out 0.3s infinite alternate}
@keyframes pop{from{transform:scale(.7);opacity:.2}to{transform:scale(1);opacity:1}}
@keyframes glow{from{box-shadow:0 0 0 rgba(124,191,92,0)}to{box-shadow:0 0 18px rgba(124,191,92,.35)}}
.confetti{position:relative;width:100%;height:0;overflow:visible}
.confetti span{position:absolute;width:8px;height:14px;border-radius:2px;animation:fall 1.2s linear forwards}
@keyframes fall{to{transform:translateY(220px) rotate(360deg);opacity:.2}}
.toast{position:fixed;left:50%;bottom:calc(84px + var(--safe));transform:translateX(-50%);background:var(--accentDark);color:#fff;padding:10px 14px;border-radius:999px;font-size:14px;opacity:0;pointer-events:none;transition:opacity .2s;z-index:60}
.toast.show{opacity:1}
.animated-banner-wrap{background:linear-gradient(135deg,var(--accent) 0%,var(--accentDark) 100%);color:var(--accentText);overflow:hidden;white-space:nowrap;position:relative;height:36px;line-height:36px;text-align:center;font-size:14px;font-weight:600}
.animated-banner-text{display:inline-block;padding-left:100%;animation:marquee 20s linear infinite}
@keyframes marquee{0%{transform:translate(0,0)}100%{transform:translate(-100%,0)}}
.like-btn{position:absolute;top:10px;left:10px;width:36px;height:36px;border-radius:999px;background:rgba(255,255,255,.7);backdrop-filter:blur(4px);display:grid;place-items:center;color:#9ca3af;font-size:18px;box-shadow:var(--shadow-sm);transition:color .2s}
.like-btn.liked{color:red}
.payment-option{display:flex;align-items:center;gap:12px;padding:14px;border:2px solid var(--line);border-radius:14px;cursor:pointer;transition:border-color .2s,background .2s;background:#fff}
.payment-option:hover{border-color:#ccc}
.payment-option.selected{border-color:var(--accent);background:var(--accentLight)}
.payment-option .radio-dot{width:22px;height:22px;border-radius:999px;border:2px solid var(--line);display:grid;place-items:center;flex-shrink:0;transition:border-color .2s}
.payment-option.selected .radio-dot{border-color:var(--accent)}
.payment-option.selected .radio-dot::after{content:'';width:12px;height:12px;border-radius:999px;background:var(--accent)}
.payment-option i.pay-icon{font-size:22px;color:var(--accent)}
.review-card{padding:12px;border:1px solid var(--line);border-radius:12px;background:#fafafa}
.review-card+.review-card{margin-top:10px}
.review-stars{color:#FFD700;font-size:14px}
.review-stars .empty{color:#ddd}
.review-author{font-weight:600;font-size:13px;color:#111}
.review-text{font-size:13px;color:#444;margin-top:4px}
.review-date{font-size:11px;color:var(--muted);margin-top:4px}
.join-banner{background:linear-gradient(135deg,var(--accent) 0%,var(--accentDark) 100%);color:#fff;border-radius:var(--radius);padding:20px;text-align:center;margin-top:16px}
.join-banner h3{margin:0 0 6px;font-family:Poppins}
.join-banner p{margin:0 0 12px;opacity:.9;font-size:14px}
.support-footer{text-align:center;padding:20px 14px;margin-top:16px}
.support-footer a{color:var(--accent);font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px}
.contact-card{display:flex;align-items:center;gap:14px;padding:16px;border:1px solid var(--line);border-radius:14px;background:#fff;margin-bottom:10px;cursor:pointer;transition:box-shadow .2s}
.contact-card:hover{box-shadow:var(--shadow)}
.contact-icon{width:48px;height:48px;border-radius:14px;display:grid;place-items:center;font-size:20px;flex-shrink:0}
.contact-icon.email-icon{background:var(--accentLight);color:var(--accentDark)}
.contact-icon.phone-icon{background:#E6F7EE;color:var(--success)}
.contact-icon.whatsapp-icon{background:#E6FAE6;color:#25D366}
.profile-head{display:flex;flex-direction:column;align-items:center;gap:8px;margin:12px 0 16px}
.avatar{width:96px;height:96px;border-radius:999px;overflow:hidden;border:3px solid var(--accent);box-shadow:0 2px 6px rgba(0,0,0,.08)}
.avatar img{width:100%;height:100%;object-fit:cover}
.notif-banner{background:#E6F7EE;border:1px solid #CFF7DF;border-radius:14px;padding:14px;margin-bottom:12px;display:flex;align-items:center;gap:12px}
.notif-banner.warning{background:#FFF7E6;border-color:#FFE0A3}
.notif-banner i{font-size:22px;flex-shrink:0}
.map-container{width:100%;height:220px;border-radius:14px;overflow:hidden;border:1px solid var(--line);margin-top:8px}
.chatbot-icon{position:fixed;bottom:calc(96px + var(--safe));right:16px;z-index:50;width:56px;height:56px;border-radius:999px;background:var(--accent);color:var(--accentText);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;transition:transform .2s}
.chatbot-icon:hover{transform:scale(1.05)}
.chatbot-popup{position:fixed;bottom:0;left:0;right:0;width:100%;height:80vh;background:var(--surface);border:none;border-radius:var(--radius) var(--radius) 0 0;box-shadow:var(--shadow);display:flex;flex-direction:column;z-index:50;transform:translateY(100%);opacity:0;pointer-events:none;transition:transform .3s ease,opacity .3s ease;max-height:80vh}
.chatbot-popup.visible{transform:translateY(0);opacity:1;pointer-events:auto}
@media(min-width:768px){.chatbot-popup{bottom:calc(160px + var(--safe));left:auto;right:16px;width:320px;height:auto;max-height:400px;border-radius:var(--radius);transform:scale(.95)}.chatbot-popup.visible{transform:scale(1)}}
.chatbot-header{background:var(--accent);color:var(--accentText);padding:12px 16px;border-top-left-radius:var(--radius);border-top-right-radius:var(--radius);display:flex;align-items:center;justify-content:space-between}
.chatbot-body{flex:1;padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.chatbot-msg-container{display:flex;width:100%}
.chatbot-msg-container.user-msg{justify-content:flex-end}
.chatbot-msg-container.bot-msg{justify-content:flex-start}
.chatbot-msg{background:var(--accent);color:var(--accentText);padding:10px 14px;border-radius:18px;max-width:80%;word-wrap:break-word;box-shadow:var(--shadow-sm)}
.chatbot-msg.bot{background:var(--accentLight);color:#111;border:1px solid var(--line)}
.chatbot-questions{display:flex;flex-direction:column;gap:8px}
.chatbot-questions .question-chip{padding:10px 14px;background:var(--accentLight);border:none;border-radius:12px;cursor:pointer;color:#111;font-size:14px;transition:background .2s;text-align:left}
.chatbot-questions .question-chip:hover{background:#d4edca}
.del-order-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow-sm)}
.del-order-card .del-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.del-order-card .del-items{font-size:13px;color:var(--muted);margin:6px 0}
.del-status-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600}
.del-status-chip.pending{background:#FFF7E6;color:#D97706;border:1px solid #FFE0A3}
.del-status-chip.accepted{background:#E0F2FE;color:#0284C7;border:1px solid #BAE6FD}
.del-status-chip.picked{background:#F3E8FF;color:#7C3AED;border:1px solid #DDD6FE}
.del-status-chip.delivered{background:#E6F7EE;color:#18A957;border:1px solid #CFF7DF}
.del-stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.del-stat{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;text-align:center}
.del-stat .num{font-size:24px;font-weight:700;font-family:Poppins;color:var(--accent)}
.del-stat .lbl{font-size:11px;color:var(--muted);margin-top:2px}
</style>
</head>
<body>

<div id="store-app">
  <div class="animated-banner-wrap" id="animated-banner-wrap" style="display:none">
    <div class="animated-banner-text" id="animated-banner-text"></div>
  </div>
  <div id="app" class="wrap">
    <header class="topbar">
      <div class="topbar-inner">
        <button id="back-btn" class="icon-round" aria-label="Back" style="display:none"><i class="fa-solid fa-arrow-left"></i></button>
        <img id="app-logo" class="topbar-logo" src="" alt="" style="display:none">
        <h1 id="page-title" class="title">Saphau Foods</h1>
      </div>
    </header>
    <main id="view" aria-live="polite" style="padding-bottom:96px"></main>
    <nav class="tabbar">
      <div class="tabbar-inner four-tabs" id="tabbar-inner">
        <a class="tab" data-tab="home" href="#/home"><i class="fa-solid fa-house"></i><span>Home</span></a>
        <a class="tab" data-tab="shop" href="#/shop"><i class="fa-solid fa-magnifying-glass"></i><span>Shop</span></a>
        <a class="tab" data-tab="cart" href="#/cart"><i class="fa-solid fa-cart-shopping"></i><span>Cart</span></a>
        <a class="tab" data-tab="account" href="#/account"><i class="fa-regular fa-user"></i><span>Account</span></a>
      </div>
    </nav>
  </div>
  <div id="toast" class="toast">Added to cart</div>
</div>

<button class="chatbot-icon" id="chatbot-toggle"><i class="fa-solid fa-comment-dots"></i></button>
<div class="chatbot-popup" id="chatbot-popup">
  <div class="chatbot-header">
    <div style="font-weight:600">Saphau AI</div>
    <button class="icon-round" style="background:transparent;border:none;color:var(--accentText);width:28px;height:28px" id="chatbot-close"><i class="fa-solid fa-xmark"></i></button>
  </div>
  <div class="chatbot-body" id="chatbot-body">
    <div class="chatbot-questions" id="chatbot-questions"></div>
  </div>
</div>

<script>
const $=s=>document.querySelector(s);
const $$=s=>Array.from(document.querySelectorAll(s));
const money=n=>'\u20B9'+(n||0).toLocaleString("en-IN");
const uid=()=>'p_'+Math.random().toString(36).slice(2)+Date.now().toString(36);
const readLocal=(k,d)=>{try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(d))}catch{return d}};
const writeLocal=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
const escapeHtml=(s="")=>s.replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]));
const toast=msg=>{const t=$("#toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1400)};
const routeTo=hash=>{location.hash=hash};

let PROFILE=readLocal("sf_profile",{name:"",email:"",phone:"",address:"",pincode:"",city:"",state:"",district:"",landmark:"",avatar:"",isComplete:false,favorites:[]});
const saveProfile=()=>writeLocal("sf_profile",PROFILE);
const hasCompleteProfile=()=>!!(PROFILE.name&&PROFILE.email&&PROFILE.phone&&PROFILE.address&&PROFILE.pincode);

let PRODUCTS=[];
let CART=readLocal("sf_cart",[]);
const saveCart=()=>writeLocal("sf_cart",CART);
const cartTotal=()=>CART.reduce((a,c)=>{const p=PRODUCTS.find(x=>x.id===c.productId);return a+(p?((p.price||0)*c.qty+(p.shipping||50)):0)},0);

let ORDERS=[];let RATINGS=[];let DELIVERY_APPS=[];
let HERO_IMAGE_URL="";let BANNER_TEXT="";let APP_LOGO_URL="";

const productsRef=db.ref('products');
const ordersRef=db.ref('orders');
const ratingsRef=db.ref('ratings');
const appConfigRef=db.ref('config');
const deliveryAppsRef=db.ref('deliveryApplications');

let dataFetched={products:false,orders:false,ratings:false,config:false};

function showLoader(){$("#view").innerHTML=`<div class="loader"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div style="color:var(--accent);font-weight:600">Loading...</div></div>`}
function checkAndRender(){if(dataFetched.products&&dataFetched.orders&&dataFetched.ratings&&dataFetched.config)render()}

productsRef.on('value',snap=>{PRODUCTS=snap.val()?Object.values(snap.val()):[];PRODUCTS.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));dataFetched.products=true;checkAndRender()});
ordersRef.on('value',snap=>{ORDERS=snap.val()?Object.values(snap.val()):[];ORDERS.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));dataFetched.orders=true;checkAndRender()});
ratingsRef.on('value',snap=>{RATINGS=snap.val()?Object.values(snap.val()):[];dataFetched.ratings=true;checkAndRender()});
appConfigRef.on('value',snap=>{const c=snap.val()||{};HERO_IMAGE_URL=c.heroImage||"";BANNER_TEXT=c.bannerText||"";APP_LOGO_URL=c.appLogo||"";
  if(BANNER_TEXT){$("#animated-banner-text").textContent=BANNER_TEXT;$("#animated-banner-wrap").style.display="block"}else{$("#animated-banner-wrap").style.display="none"}
  if(APP_LOGO_URL){$("#app-logo").src=APP_LOGO_URL;$("#app-logo").style.display="block"}else{$("#app-logo").style.display="none"}
  dataFetched.config=true;checkAndRender()});
deliveryAppsRef.on('value',snap=>{DELIVERY_APPS=snap.val()?Object.values(snap.val()):[];DELIVERY_APPS.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));updateTabbar();if(dataFetched.products)render()});

function parseRoute(){const h=location.hash.replace(/^#/,"")||"shop";return{parts:h.split("?")[0].split("/").filter(Boolean)}}
function setTopbar(title,showBack){$("#page-title").textContent=title;$("#back-btn").style.display=showBack?"inline-grid":"none"}
function setActiveTab(name){$$(".tab").forEach(t=>t.classList.toggle("active",t.dataset.tab===name))}
$("#back-btn").addEventListener("click",()=>history.back());
window.addEventListener("hashchange",render);
window.addEventListener("popstate",render);

function ensureProfileBefore(nextHash){if(!hasCompleteProfile()){writeLocal("sf_next",nextHash||"#/checkout");routeTo("#/profile/setup");return false}return true}
function renderStarIcons(rating,max=5){let h='';for(let i=1;i<=max;i++)h+=i<=rating?'<i class="fa-solid fa-star"></i>':'<i class="fa-solid fa-star empty"></i>';return h}
function getProductRating(pid){const r=RATINGS.filter(x=>x.productId===pid);if(!r.length)return 0;return(r.reduce((s,x)=>s+x.rating,0)/r.length).toFixed(1)}

function getDeliveryApprovalStatus(){
  if(!PROFILE.email)return null;
  return DELIVERY_APPS.find(a=>a.email&&a.email.toLowerCase()===PROFILE.email.toLowerCase());
}
function isApprovedDeliveryBoy(){
  const app=getDeliveryApprovalStatus();
  return app&&app.status==='Approved';
}

function updateTabbar(){
  const tb=$("#tabbar-inner");
  const approved=isApprovedDeliveryBoy();
  if(approved){
    tb.classList.remove("four-tabs");
    tb.innerHTML=`
      <a class="tab" data-tab="home" href="#/home"><i class="fa-solid fa-house"></i><span>Home</span></a>
      <a class="tab" data-tab="shop" href="#/shop"><i class="fa-solid fa-magnifying-glass"></i><span>Shop</span></a>
      <a class="tab" data-tab="delivery" href="#/delivery/dashboard"><i class="fa-solid fa-motorcycle"></i><span>Deliver</span></a>
      <a class="tab" data-tab="cart" href="#/cart"><i class="fa-solid fa-cart-shopping"></i><span>Cart</span></a>
      <a class="tab" data-tab="account" href="#/account"><i class="fa-regular fa-user"></i><span>Account</span></a>`;
  }else{
    tb.classList.add("four-tabs");
    tb.innerHTML=`
      <a class="tab" data-tab="home" href="#/home"><i class="fa-solid fa-house"></i><span>Home</span></a>
      <a class="tab" data-tab="shop" href="#/shop"><i class="fa-solid fa-magnifying-glass"></i><span>Shop</span></a>
      <a class="tab" data-tab="cart" href="#/cart"><i class="fa-solid fa-cart-shopping"></i><span>Cart</span></a>
      <a class="tab" data-tab="account" href="#/account"><i class="fa-regular fa-user"></i><span>Account</span></a>`;
  }
}

function HomeView(){
  setTopbar("Home",false);setActiveTab("home");
  const app=getDeliveryApprovalStatus();
  let notifHtml='';
  if(app){
    if(app.status==='Approved') notifHtml=`<div class="notif-banner"><i class="fa-solid fa-circle-check" style="color:var(--success)"></i><div><strong>You're approved as Delivery Partner!</strong> Zone: <strong>${escapeHtml(app.deliveryFrom||'')} to ${escapeHtml(app.deliveryTo||'')}</strong><br><a href="#/delivery/dashboard" style="color:var(--accent);font-weight:700;font-size:13px"><i class="fa-solid fa-motorcycle"></i> Go to Delivery Dashboard &rarr;</a></div></div>`;
    else if(app.status==='Pending') notifHtml=`<div class="notif-banner warning"><i class="fa-solid fa-clock" style="color:#F59E0B"></i><div><strong>Application Pending</strong> — Your delivery partner application is under review.</div></div>`;
    else if(app.status==='Rejected') notifHtml=`<div class="notif-banner" style="background:#FEE2E2;border-color:#FECACA"><i class="fa-solid fa-circle-xmark" style="color:#E11D48"></i><div><strong>Application Rejected</strong> — Unfortunately your application was not approved.</div></div>`;
  }
  $("#view").innerHTML=`
    <section style="padding:14px">
      ${notifHtml}
      <div class="card" style="overflow:hidden">
        ${HERO_IMAGE_URL?`<div class="hero-img"><img src="${HERO_IMAGE_URL}" alt="Hero"/></div>`:''}
        <div class="pad" style="padding:16px">
          <h2 style="margin:0 0 6px;font-family:Poppins;color:var(--accentDark)">Fresh & Delicious. Every Time.</h2>
          <p class="muted" style="margin:0 0 12px">Authentic Indian cuisine made with care.</p>
          <button class="btn" onclick="routeTo('#/shop')"><i class="fa-solid fa-utensils"></i> Order Now</button>
        </div>
      </div>
      <h3 style="margin:16px 4px 8px;font-family:Poppins;color:var(--accentDark)">Featured</h3>
      <div class="grid" id="home-grid"></div>
      <div class="join-banner">
        <h3><i class="fa-solid fa-motorcycle"></i> Become a Delivery Partner</h3>
        <p>Earn money on your schedule. Join our delivery team today!</p>
        <button class="btn" style="background:#fff;color:var(--accentDark)" onclick="routeTo('#/join-team')">Join Our Team</button>
      </div>
      <div class="support-footer"><a href="#/contact-support"><i class="fa-solid fa-headset"></i> Need Help? Contact Support</a></div>
    </section>`;
  const grid=$("#home-grid");
  const feat=PRODUCTS.slice(0,6);
  if(feat.length>0){grid.innerHTML=feat.map(p=>ProductCard(p)).join("");attachProductCardHandlers(grid)}
  else grid.innerHTML=`<div class="muted" style="text-align:center;grid-column:1/3">No featured products yet.</div>`;
}

function ShopView(){
  setTopbar("Shop",false);setActiveTab("shop");
  const cats=[...new Set(PRODUCTS.map(p=>p.category).filter(Boolean))];
  $("#view").innerHTML=`
    <section style="padding:14px">
      <div class="filters"><button class="chip active" data-filter="all">All</button>${cats.map(c=>`<button class="chip" data-filter="${escapeHtml(c)}">${escapeHtml(c)}</button>`).join("")}</div>
      <div class="card" style="padding:10px 12px;margin:8px 0 12px;display:flex;gap:10px;align-items:center">
        <i class="fa-solid fa-magnifying-glass" style="color:#9CA3AF"></i>
        <input id="shop-search" placeholder="Search products..." style="border:none;padding:10px 0;outline:none">
      </div>
      <div class="grid" id="shop-grid"></div>
      <div class="support-footer"><a href="#/contact-support"><i class="fa-solid fa-headset"></i> Need Help? Contact Support</a></div>
    </section>`;
  const grid=$("#shop-grid");let activeFilter="all";
  const draw=(term="")=>{
    const list=PRODUCTS.filter(p=>(activeFilter==="all"||p.category===activeFilter)&&(!term||p.name.toLowerCase().includes(term.toLowerCase())));
    grid.innerHTML=list.length?list.map(p=>ProductCard(p)).join(""):`<div class="muted" style="text-align:center;grid-column:1/3">No products found.</div>`;
    attachProductCardHandlers(grid);
  };
  draw();
  $("#shop-search").addEventListener("input",e=>draw(e.target.value));
  $$(".filters .chip").forEach(btn=>btn.addEventListener("click",()=>{$$(".filters .chip").forEach(b=>b.classList.remove("active"));btn.classList.add("active");activeFilter=btn.dataset.filter;draw($("#shop-search").value)}));
}

function ProductCard(p){
  const off=p.discountPercent?`<div class="discount-badge">${p.discountPercent}% OFF</div>`:"";
  const avg=getProductRating(p.id);
  const stars=avg>0?`<div class="star-rating">${avg} <i class="fa-solid fa-star"></i></div>`:'';
  const isFav=PROFILE.favorites.includes(p.id);
  return`<a class="card p-card" href="#/product/${p.id}" data-open="${p.id}">
    <button class="like-btn ${isFav?'liked':''}" data-product-id="${p.id}" aria-label="Fav"><i class="fa-solid fa-heart"></i></button>
    <div class="p-img"><img src="${p.imageUrls[0]||""}" alt="${escapeHtml(p.name)}">${off}</div>
    <div class="p-meta"><div class="p-title">${escapeHtml(p.name)}</div>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div class="price-line"><div style="font-weight:700;color:var(--accentDark)">${money(p.price||0)}</div>${p.priceMrp?`<div class="strike">${money(p.priceMrp)}</div>`:""}</div>${stars}
      </div>
      <div class="muted" style="font-size:12px">Shipping: ${money(p.shipping||50)}</div>
    </div></a>`;
}

function attachProductCardHandlers(scope){
  if(!scope)return;
  scope.querySelectorAll("[data-open]").forEach(el=>el.addEventListener("click",e=>{e.preventDefault();routeTo(`#/product/${el.dataset.open}`)}));
  scope.querySelectorAll(".like-btn").forEach(btn=>{
    btn.addEventListener("click",e=>{e.preventDefault();e.stopPropagation();toggleFavorite(btn.dataset.productId,btn)});
    btn.classList.toggle('liked',PROFILE.favorites.includes(btn.dataset.productId));
  });
}

function ProductView(id){
  const p=PRODUCTS.find(x=>x.id===id);if(!p){routeTo("#/shop");return}
  setTopbar(p.name,true);setActiveTab("");
  const avg=getProductRating(p.id);
  const pRatings=RATINGS.filter(r=>r.productId===id);
  const isOrdered=ORDERS.some(o=>o.customer&&o.customer.email===PROFILE.email&&o.items&&o.items.some(i=>i.productId===id));
  const isFav=PROFILE.favorites.includes(p.id);
  const shipping=p.shipping||50;
  let reviewsHtml='';
  if(pRatings.length>0){
    reviewsHtml=`<div style="margin-top:20px"><h4 style="margin:0 0 12px;font-family:Poppins;color:var(--accentDark)"><i class="fa-solid fa-comments"></i> Customer Reviews (${pRatings.length})</h4>
      ${pRatings.map(r=>`<div class="review-card"><div style="display:flex;align-items:center;justify-content:space-between"><div class="review-author">${escapeHtml(r.userName||r.userEmail||'Anonymous')}</div><div class="review-stars">${renderStarIcons(r.rating)}</div></div>${r.reviewText?`<div class="review-text">${escapeHtml(r.reviewText)}</div>`:''}<div class="review-date">${r.createdAt?new Date(r.createdAt).toLocaleDateString():''}</div></div>`).join('')}</div>`;
  }
  $("#view").innerHTML=`
    <section>
      <div class="hero-img"><img src="${p.imageUrls[0]||""}" alt="${escapeHtml(p.name)}"></div>
      <div style="padding:0 16px 16px">
        <div style="display:flex;align-items:start;justify-content:space-between;gap:8px">
          <div>
            <h2 style="margin:0 0 6px;font-family:Poppins;color:var(--accentDark)">${escapeHtml(p.name)}</h2>
            <div class="price-line" style="margin:6px 0">
              <div style="font-family:Poppins;font-weight:700;font-size:22px;color:var(--accentDark)">${money(p.price||0)}</div>
              ${p.priceMrp?`<div class="strike">${money(p.priceMrp)}</div>`:""}
              ${p.discountPercent?`<span class="badge-off">${p.discountPercent}% OFF</span>`:""}
            </div>
            ${avg>0?`<div class="star-rating">${avg} <i class="fa-solid fa-star"></i> (${pRatings.length} reviews)</div>`:''}
            <div class="muted" style="max-width:560px">${escapeHtml(p.description||"")}</div>
            <div class="muted" style="margin-top:8px">Shipping: ${money(shipping)}</div>
          </div>
          <button class="icon-round ${isFav?'liked':''}" id="product-like-btn" style="${isFav?'color:red':''}"><i class="fa-solid fa-heart"></i></button>
        </div>
        <div style="margin:16px 0 8px;font-weight:700">Quantity</div>
        <div id="qty-row" style="display:flex;gap:10px">${[1,2,5,10].map((q,i)=>`<button class="size-btn ${i===0?'active':''}" data-qty="${q}">${q}</button>`).join("")}</div>
        <div style="position:sticky;bottom:calc(84px + var(--safe));margin-top:16px">
          <button class="btn btn-block" id="buy-now" style="background:var(--success);margin-bottom:10px"><i class="fa-solid fa-bolt"></i> Buy Now</button>
          <button class="btn btn-block" id="add-to-cart"><i class="fa-solid fa-cart-plus"></i> Add to Cart</button>
        </div>
        ${isOrdered?`<div class="card pad" style="margin-top:16px"><h4 style="margin:0 0 10px;font-family:Poppins;color:var(--accentDark)">Rate & Review this product</h4>
          <div id="rate-stars" class="rate-stars" style="font-size:24px;color:#ccc">${[1,2,3,4,5].map(i=>`<i class="fa-solid fa-star" data-rating="${i}"></i>`).join('')}</div>
          <textarea id="review-text" placeholder="Write your review here... (optional)" style="margin-top:10px;min-height:70px"></textarea>
          <button class="btn" id="submit-review-btn" style="margin-top:10px"><i class="fa-solid fa-paper-plane"></i> Submit Review</button></div>`:''}
        ${reviewsHtml}
      </div>
    </section>`;
  let selectedQty=1,selectedRating=0;
  $("#qty-row").querySelectorAll(".size-btn").forEach(b=>b.addEventListener("click",()=>{$("#qty-row").querySelectorAll(".size-btn").forEach(x=>x.classList.remove("active"));b.classList.add("active");selectedQty=Number(b.dataset.qty)}));
  $("#product-like-btn").addEventListener("click",e=>{e.stopPropagation();toggleFavorite(p.id,$("#product-like-btn"))});
  const rateStars=$("#rate-stars");
  if(rateStars){
    const existing=RATINGS.find(r=>r.productId===id&&r.userEmail===PROFILE.email);
    if(existing){selectedRating=existing.rating;for(let i=1;i<=existing.rating;i++)rateStars.querySelector(`[data-rating="${i}"]`).classList.add("active");if(existing.reviewText&&$("#review-text"))$("#review-text").value=existing.reviewText}
    rateStars.querySelectorAll(".fa-star").forEach(star=>star.addEventListener("click",()=>{selectedRating=Number(star.dataset.rating);rateStars.querySelectorAll(".fa-star").forEach(s=>s.classList.remove("active"));for(let i=1;i<=selectedRating;i++)rateStars.querySelector(`[data-rating="${i}"]`).classList.add("active")}));
  }
  const submitBtn=$("#submit-review-btn");
  if(submitBtn)submitBtn.addEventListener("click",()=>{if(!selectedRating){alert("Please select a star rating.");return}submitRating(id,selectedRating,PROFILE.email,PROFILE.name,($("#review-text")?.value||"").trim())});
  $("#buy-now").addEventListener("click",()=>{addToCart(p.id,"NA",selectedQty);if(ensureProfileBefore("#/cod/review")){const items=[{productId:p.id,name:p.name,price:p.price,mrp:p.priceMrp,shipping:shipping,qty:selectedQty,size:"NA"}];const amount=(p.price||0)*selectedQty+shipping;const orderId="SCF-"+Date.now().toString().slice(-8);writeLocal("sf_pending",{orderId,items,customer:{...PROFILE},amount,status:"COD - Pending"});routeTo("#/cod/review")}});
  $("#add-to-cart").addEventListener("click",()=>{addToCart(p.id,"NA",selectedQty);toast("Added to cart");routeTo("#/cart")});
}

function submitRating(productId,rating,userEmail,userName,reviewText){
  const existing=RATINGS.find(r=>r.productId===productId&&r.userEmail===userEmail);
  const data={productId,userEmail,userName:userName||'',rating,reviewText:reviewText||'',createdAt:Date.now()};
  if(existing){db.ref('ratings/'+existing.firebaseKey).update(data).then(()=>toast("Review updated!")).catch(()=>alert("Failed."))}
  else{const k=db.ref('ratings').push().key;db.ref('ratings/'+k).set({...data,firebaseKey:k}).then(()=>toast("Review submitted!")).catch(()=>alert("Failed."))}
}
function toggleFavorite(pid,btn){if(PROFILE.favorites.includes(pid)){PROFILE.favorites=PROFILE.favorites.filter(id=>id!==pid);btn?.classList.remove('liked');btn&&(btn.style.color='');toast("Removed")}else{PROFILE.favorites.push(pid);btn?.classList.add('liked');btn&&(btn.style.color='red');toast("Added to favorites")}saveProfile()}

function CartView(){
  setTopbar("Shopping Cart",true);setActiveTab("cart");
  const total=cartTotal();
  const shipT=CART.reduce((a,c)=>{const p=PRODUCTS.find(x=>x.id===c.productId);return a+(p?(p.shipping||50):0)},0);
  const sub=total-shipT;
  $("#view").innerHTML=`<section style="padding:14px">${CART.length===0?`<div class="card pad" style="text-align:center;padding:26px"><div style="font-size:48px;color:var(--accent);margin-bottom:12px"><i class="fa-solid fa-cart-shopping"></i></div><div class="muted">Your cart is empty.</div><div style="margin-top:10px"><a class="btn btn-outline" href="#/shop">Browse Products</a></div></div>`:`
    <div class="cart-list" id="cart-list">${CART.map(r=>CartItem(r)).join("")}</div>
    <div class="card sticky-sheet" style="margin-top:16px">
      <div class="row"><div class="muted">Subtotal</div><div>${money(sub)}</div></div>
      <div class="row"><div class="muted">Shipping</div><div>${money(shipT)}</div></div>
      <div class="sep"></div>
      <div class="row" style="font-weight:800;color:var(--accentDark)"><div>Total</div><div>${money(total)}</div></div>
      <div style="margin-top:10px"><button class="btn btn-block" id="to-checkout"><i class="fa-solid fa-lock"></i> Proceed to Checkout</button></div>
    </div>`}</section>`;
  attachCartHandlers();
  $("#to-checkout")?.addEventListener("click",()=>{if(ensureProfileBefore("#/checkout"))routeTo("#/checkout")});
}
function CartItem(it){
  const p=PRODUCTS.find(x=>x.id===it.productId);if(!p)return"";
  const iT=(p.price||0)*it.qty+(p.shipping||50);
  return`<div class="cart-item" data-id="${it.productId}"><img src="${p.imageUrls[0]||""}" alt="${escapeHtml(p.name)}"><div><div style="font-weight:700">${escapeHtml(p.name)}</div><div class="price-line" style="margin-top:4px"><div style="font-weight:700;color:var(--accentDark)">${money(iT)}</div>${p.priceMrp?`<div class="strike">${money((p.priceMrp||0)*it.qty)}</div>`:""}</div><div class="qty"><button class="circle-btn" data-dec>-</button><div>${it.qty}</div><button class="circle-btn primary" data-inc>+</button><button class="circle-btn" data-rem><i class="fa-regular fa-trash-can"></i></button></div></div></div>`;
}
function attachCartHandlers(){$$("#cart-list .cart-item").forEach(item=>{const pid=item.dataset.id;item.querySelector("[data-inc]").addEventListener("click",()=>changeQty(pid,+1));item.querySelector("[data-dec]").addEventListener("click",()=>changeQty(pid,-1));item.querySelector("[data-rem]").addEventListener("click",()=>removeFromCart(pid))})}
function addToCart(pid,size,qty){const idx=CART.findIndex(x=>x.productId===pid);if(idx>-1)CART[idx].qty+=qty;else CART.push({productId:pid,size,qty});saveCart()}
function changeQty(pid,d){const idx=CART.findIndex(x=>x.productId===pid);if(idx===-1)return;CART[idx].qty=Math.max(1,CART[idx].qty+d);saveCart();render()}
function removeFromCart(pid){CART=CART.filter(x=>x.productId!==pid);saveCart();render()}

function CheckoutView(){
  if(CART.length===0){routeTo("#/cart");return}
  setTopbar("Checkout",true);setActiveTab("");
  const total=cartTotal();const shipT=CART.reduce((a,c)=>{const p=PRODUCTS.find(x=>x.id===c.productId);return a+(p?(p.shipping||50):0)},0);const sub=total-shipT;
  $("#view").innerHTML=`
    <section style="padding:14px">
      <div class="card pad">
        <h3 style="margin:0 0 10px;font-family:Poppins;color:var(--accentDark)">Contact Information</h3>
        <label>Full Name</label><input id="ch-name" required>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div><label>Email</label><input id="ch-email" type="email" required></div><div><label>Phone</label><input id="ch-phone" type="tel" required></div></div>
        <h3 style="margin:16px 0 8px;font-family:Poppins;color:var(--accentDark)">Shipping Address</h3>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div><label>City</label><input id="ch-city"></div><div><label>Pincode</label><input id="ch-pincode" required></div></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div><label>State</label><input id="ch-state"></div><div><label>District</label><input id="ch-district"></div></div>
        <label>Landmark</label><input id="ch-landmark">
        <h3 style="margin:16px 0 8px;font-family:Poppins;color:var(--accentDark)"><i class="fa-solid fa-location-dot"></i> Delivery Location</h3>
        <p class="muted" style="font-size:12px;margin:0 0 6px">Tap/click on the map to set your exact delivery location</p>
        <div id="checkout-map" class="map-container"></div>
        <input id="ch-lat" type="hidden"><input id="ch-lng" type="hidden">
        <div id="ch-loc-text" class="muted" style="font-size:12px;margin-top:6px"></div>
        <button type="button" class="btn btn-outline" style="margin-top:8px;font-size:13px" id="ch-use-gps"><i class="fa-solid fa-crosshairs"></i> Use My Current Location</button>
      </div>
      <div class="card pad" style="margin-top:16px">
<h3 style="margin:0 0 12px;font-family:Poppins;color:var(--accentDark)">Payment Method</h3>
        <div style="display:flex;flex-direction:column;gap:10px" id="payment-methods">
          <div class="payment-option selected" data-method="cod"><div class="radio-dot"></div><i class="fa-solid fa-money-bill-wave pay-icon"></i><div><div style="font-weight:700;color:#111">Cash on Delivery</div><div class="muted" style="font-size:12px">Pay when your order arrives</div></div></div>
          <div class="payment-option" data-method="online"><div class="radio-dot"></div><i class="fa-solid fa-credit-card pay-icon"></i><div><div style="font-weight:700;color:#111">Pay Online (UPI)</div><div class="muted" style="font-size:12px">Pay via UPI, Google Pay, PhonePe</div></div></div>

      </div>
      <div class="card sticky-sheet" style="margin-top:16px">
        <div class="row"><div class="muted">Subtotal</div><div>${money(sub)}</div></div>
        <div class="row"><div class="muted">Shipping</div><div>${money(shipT)}</div></div>
        <div class="sep"></div>
        <div class="row" style="font-weight:800;color:var(--accentDark)"><div>Total</div><div>${money(total)}</div></div>
        <div style="margin-top:10px"><button class="btn btn-block" id="checkout-next"><i class="fa-solid fa-check"></i> Place Order</button></div>
      </div>
    </section>`;
  $("#ch-name").value=PROFILE.name||"";$("#ch-email").value=PROFILE.email||"";$("#ch-phone").value=PROFILE.phone||"";
  $("#ch-address").value=PROFILE.address||"";$("#ch-city").value=PROFILE.city||"";$("#ch-pincode").value=PROFILE.pincode||"";
  $("#ch-state").value=PROFILE.state||"";$("#ch-district").value=PROFILE.district||"";$("#ch-landmark").value=PROFILE.landmark||"";
  setTimeout(()=>{
    const map=L.map('checkout-map').setView([20.5937,78.9629],5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OSM'}).addTo(map);
    let marker=null;
    function setMarker(lat,lng){if(marker)map.removeLayer(marker);marker=L.marker([lat,lng]).addTo(map);map.setView([lat,lng],15);$("#ch-lat").value=lat;$("#ch-lng").value=lng;$("#ch-loc-text").textContent=`Location: ${lat.toFixed(5)}, ${lng.toFixed(5)}`}
    map.on('click',e=>setMarker(e.latlng.lat,e.latlng.lng));
    $("#ch-use-gps").addEventListener("click",()=>{if(navigator.geolocation){navigator.geolocation.getCurrentPosition(pos=>setMarker(pos.coords.latitude,pos.coords.longitude),()=>alert("Could not get location."))}else alert("Geolocation not supported.")});
  },100);
  let payMethod="cod";
  $$("#payment-methods .payment-option").forEach(opt=>opt.addEventListener("click",()=>{$$("#payment-methods .payment-option").forEach(o=>o.classList.remove("selected"));opt.classList.add("selected");payMethod=opt.dataset.method}));

function ProfileEditView(isSetup=false){
  setTopbar("Account",true);setActiveTab("");
  $("#view").innerHTML=`<section style="padding:14px"><div class="profile-head"><div class="avatar"><img id="avatar-img" src="${PROFILE.avatar||'https://i.pravatar.cc/200?u=sf'}" alt="avatar"></div><label class="chip" style="cursor:pointer"><i class="fa-solid fa-camera" style="color:var(--accent)"></i> Change Photo<input type="file" id="avatar-file" accept="image/*" style="display:none"></label></div>
    <div class="card pad"><h3 style="margin:0 0 12px;font-family:Poppins;color:var(--accentDark)">Profile Information</h3>
      <label>Name</label><input id="pfv-name" value="${escapeHtml(PROFILE.name||'')}">
      <label>Email</label><input id="pfv-email" type="email" value="${escapeHtml(PROFILE.email||'')}">
      <label>Phone</label><input id="pfv-phone" type="tel" value="${escapeHtml(PROFILE.phone||'')}">
      <div class="row" style="gap:10px;margin-top:10px"><div style="flex:1"><label>Pincode</label><input id="pfv-pincode" value="${escapeHtml(PROFILE.pincode||'')}"></div><div style="flex:1"><label>City</label><input id="pfv-city" value="${escapeHtml(PROFILE.city||'')}"></div></div>
      <div class="row" style="gap:10px;margin-top:10px"><div style="flex:1"><label>State</label><input id="pfv-state" value="${escapeHtml(PROFILE.state||'')}"></div><div style="flex:1"><label>District</label><input id="pfv-district" value="${escapeHtml(PROFILE.district||'')}"></div></div>
      <label style="margin-top:10px">Landmark</label><input id="pfv-landmark" value="${escapeHtml(PROFILE.landmark||'')}">
      <label style="margin-top:10px">Address</label><input id="pfv-address" value="${escapeHtml(PROFILE.address||'')}">
      <div style="margin-top:14px"><button class="btn btn-block" id="pfv-save">${isSetup?'Save & Continue':'Save Changes'}</button></div>
    </div></section>`;
  $("#avatar-file").addEventListener("change",async e=>{const f=e.target.files?.[0];if(!f)return;const url=await compressToDataURL(f,400,400,.9);PROFILE.avatar=url;saveProfile();$("#avatar-img").src=url});
  $("#pfv-save").addEventListener("click",()=>{PROFILE.name=$("#pfv-name").value.trim();PROFILE.email=$("#pfv-email").value.trim();PROFILE.phone=$("#pfv-phone").value.trim();PROFILE.pincode=$("#pfv-pincode").value.trim();PROFILE.city=$("#pfv-city").value.trim();PROFILE.state=$("#pfv-state").value.trim();PROFILE.district=$("#pfv-district").value.trim();PROFILE.landmark=$("#pfv-landmark").value.trim();PROFILE.address=$("#pfv-address").value.trim();PROFILE.isComplete=hasCompleteProfile();saveProfile();const next=readLocal("sf_next",null);localStorage.removeItem("sf_next");toast("Profile saved");if(isSetup&&next)routeTo(next);else{updateTabbar();routeTo("#/account")}});
}

function OrdersListView(){
  setTopbar("Order History",true);setActiveTab("");
  const rows=[...ORDERS].filter(o=>o.customer&&o.customer.email===PROFILE.email).sort((a,b)=>b.createdAt-a.createdAt);
  $("#view").innerHTML=`<section style="padding:14px">${rows.length===0?`<div class="card pad" style="text-align:center"><div style="font-size:48px;color:var(--accent);margin-bottom:12px"><i class="fa-regular fa-clipboard"></i></div><div class="muted">No orders yet.</div></div>`:rows.map(o=>{
    const delInfo=o.deliveryBoy?`<div class="muted" style="font-size:12px;margin-top:4px"><i class="fa-solid fa-motorcycle" style="color:var(--accent)"></i> ${escapeHtml(o.deliveryBoy.name||'')} — ${escapeHtml(o.deliveryStatus||'')}</div>`:'';
    return`<a class="card pad" style="display:block;margin-bottom:12px" href="#/account/orders/${o.orderId}"><div class="row"><strong style="color:var(--accentDark)">#${escapeHtml(o.orderId)}</strong><span class="muted">${new Date(o.createdAt).toLocaleString()}</span></div><div class="row" style="margin-top:6px"><div class="muted">${escapeHtml(o.items.map(i=>i.name+" x"+i.qty).join(", "))}</div><div><strong style="color:var(--accentDark)">${money(o.amount)}</strong></div></div><div class="chip" style="margin-top:8px;background:var(--accentLight);border-color:var(--accent);color:var(--accentDark)">${escapeHtml(o.status)}</div>${delInfo}</a>`}).join("")}</section>`;

  const delHtml=o.deliveryBoy?`<div class="card pad" style="margin-top:12px"><h4 style="margin:0 0 8px;font-family:Poppins;color:var(--accentDark)"><i class="fa-solid fa-motorcycle"></i> Delivery Partner</h4><div>${escapeHtml(o.deliveryBoy.name||'—')}</div><div class="muted">${escapeHtml(o.deliveryBoy.phone||'')}</div><div class="chip" style="margin-top:6px;background:var(--accentLight);color:var(--accentDark)">${escapeHtml(o.deliveryStatus||'Assigned')}</div></div>`:'';

    <div class="row"><div><strong style="color:var(--accentDark)">Order</strong> #${escapeHtml(o.orderId)}</div><div class="muted">${new Date(o.createdAt).toLocaleString()}</div></div><div class="sep"></div>
    ${o.items.map(it=>`<div class="row"><div>${escapeHtml(it.name)} <span class="muted">x${it.qty}</span></div><div style="color:var(--accentDark)">${money((it.price||0)*it.qty+(it.shipping||50))}</div></div>`).join("")}
    <div class="sep"></div>
    <div class="row"><strong>Total</strong><strong style="color:var(--accentDark)">${money(o.amount)}</strong></div>
    <div class="chip" style="margin-top:8px;background:var(--accentLight);color:var(--accentDark)">${escapeHtml(o.status)}</div>
  </div>${delHtml}<div style="margin-top:12px"><a class="btn btn-outline" href="#/account/orders"><i class="fa-solid fa-arrow-left"></i> Back</a></div></section>`;
}

async function compressToDataURL(file,maxW=1200,maxH=1200,quality=.85){const img=await fileToImage(file);const[w,h]=fitRect(img.naturalWidth,img.naturalHeight,maxW,maxH);const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);return c.toDataURL("image/jpeg",quality)}
function fitRect(w,h,mW,mH){const r=Math.min(mW/w,mH/h,1);return[Math.round(w*r),Math.round(h*r)]}
function fileToImage(file){return new Promise((res,rej)=>{const fr=new FileReader();fr.onload=()=>{const img=new Image();img.onload=()=>res(img);img.onerror=rej;img.src=fr.result};fr.onerror=rej;fr.readAsDataURL(file)})}
function popConfetti(){const c=$("#confetti");if(!c)return;c.innerHTML="";const colors=["#7cbf5c","#5a9a3e","#a3d98a","#4a8a30","#8ed070"];for(let i=0;i<24;i++){const s=document.createElement("span");s.style.left=(4+Math.random()*92)+"%";s.style.background=colors[Math.floor(Math.random()*colors.length)];s.style.animationDelay=(Math.random()*.6)+"s";c.appendChild(s)}}
function playSuccessSound(){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator(),g=ctx.createGain();o.type="triangle";o.frequency.setValueAtTime(660,ctx.currentTime);g.gain.setValueAtTime(.001,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.3,ctx.currentTime+.02);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.4);o.connect(g).connect(ctx.destination);o.start();o.stop(ctx.currentTime+.42);setTimeout(()=>ctx.close(),600)}catch(e){}}

const chatbotToggle=$("#chatbot-toggle"),chatbotPopup=$("#chatbot-popup"),chatbotClose=$("#chatbot-close"),chatbotBody=$("#chatbot-body"),chatbotQuestions=$("#chatbot-questions");
const FAQ_DATA=[{q:"How can I place an order?",a:"Browse our menu, add items to cart, and checkout."},{q:"What are your payment options?",a:"We accept Cash on Delivery and Online Payment via UPI."},{q:"How to become a delivery partner?",a:"Visit 'Join Our Team' from Home or Account section."},{q:"How to contact support?",a:"Email us at sahpaufoodstore@gmail.com or visit Contact Support page."}];
function renderChatbotQ(){chatbotQuestions.innerHTML=FAQ_DATA.map((f,i)=>`<button class="question-chip" data-qi="${i}">${escapeHtml(f.q)}</button>`).join('');$$('.question-chip').forEach(b=>b.addEventListener('click',handleQClick))}
function handleQClick(e){const b=e.target.closest('.question-chip');if(!b)return;const i=parseInt(b.dataset.qi);addMsg(FAQ_DATA[i].q,true);chatbotQuestions.innerHTML='';const t=addMsg('Typing...',false,'typing');setTimeout(()=>{if(t)t.remove();addMsg(FAQ_DATA[i].a,false)},1200)}
function addMsg(text,isUser=false,cls=''){const c=document.createElement('div');c.className=`chatbot-msg-container ${isUser?'user-msg':'bot-msg'}`;const m=document.createElement('div');m.className=`chatbot-msg ${!isUser?'bot':''} ${cls}`;m.textContent=text;c.appendChild(m);chatbotBody.appendChild(c);chatbotBody.scrollTop=chatbotBody.scrollHeight;return cls==='typing'?m:null}
chatbotToggle.addEventListener('click',()=>{chatbotPopup.classList.toggle('visible');if(chatbotPopup.classList.contains('visible')){chatbotBody.innerHTML='';addMsg("Hello! I'm Saphau AI. Select a question:",false);renderChatbotQ()}});
chatbotClose.addEventListener('click',()=>{chatbotPopup.classList.remove('visible');chatbotBody.innerHTML=''});

function render(){
  const{parts}=parseRoute();
  if(!dataFetched.products||!dataFetched.orders||!dataFetched.ratings||!dataFetched.config){showLoader();return}
  updateTabbar();
  const[r,id,sub]=parts;
  if(!r||r==="shop")ShopView();
  else if(r==="home")HomeView();
  else if(r==="product"&&id)ProductView(id);
  else if(r==="cart")CartView();
  else if(r==="checkout")CheckoutView();
  else if(r==="pay"&&id==="online")OnlinePayView();
  else if(r==="cod"&&id==="review")CODReviewView();
  else if(r==="cod"&&id==="success")CODSuccessView();
  else if(r==="confirm")ConfirmView();
  else if(r==="account"&&id==="orders"&&sub)OrderDetailView(sub);
  else if(r==="account"&&id==="orders")OrdersListView();
  else if(r==="favorites")FavoritesView();
  else if(r==="account")AccountView();
  else if(r==="profile"&&id==="setup")ProfileEditView(true);
  else if(r==="profile")ProfileEditView(false);
  else if(r==="join-team"&&id==="success")JoinTeamSuccessView();
  else if(r==="join-team")JoinTeamView();
  else if(r==="contact-support")ContactSupportView();
  else if(r==="delivery"&&id==="dashboard")DeliveryDashboardView();
  else if(r==="delivery"&&id==="available")DeliveryAvailableView();
  else if(r==="delivery"&&id==="my-orders")DeliveryMyOrdersView();
  else ShopView();
}
(function init(){render()})();
</script>
